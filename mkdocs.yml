theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Roboto
    code: Fira Code
  icon:
      logo: fontawesome/solid/palette
      repo: fontawesome/brands/github-alt
  favicon: assets/palette-favicon.png
  palette:
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: black
        toggle:
            icon: material/lightbulb-outline
            name: Switch to light mode
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: black
        toggle:
            icon: material/lightbulb
            name: Switch to dark mode
  features:
      - navigation.path
      - navigation.footer
      - navigation.indexes
      - content.code.copy
      - content.code.select
      - content.code.annotate

extra:
  version:
    provider: mike
    alias: true
    default: latest

watch:
  - packages/data-designer-config/src/data_designer
  - packages/data-designer-engine/src/data_designer
  - packages/data-designer/src/data_designer
  - docs/

plugins:
  - search
  - blog:
      blog_dir: devnotes
      blog_toc: true
      post_date_format: long
      post_url_format: "{slug}"
      categories: false
      archive: true
      archive_toc: true
  - mike:
      alias_type: symlink
      canonical_version: latest
  - mkdocs-jupyter:
        execute: false
        include_requirejs: true
        ignore_h1_titles: True
        include_source: True
        ignore:
          - "assets/recipes/**/*.py"
  - mkdocstrings:
      handlers:
          python:
              paths:
                  - packages/data-designer-config/src
                  - packages/data-designer-engine/src
                  - packages/data-designer/src
              options:
                  show_symbol_type_heading: true
                  show_symbol_type_toc: true
                  show_root_toc_entry: true
                  show_object_full_path: false
                  filters: ["!^_"]
                  docstring_options:
                      ignore_init_summary: false
                  merge_init_into_class: true
                  docstring_section_style: table
                  summary: true

extra_css:
  - css/style.css
  - css/mkdocstrings.css

extra_javascript:
  - js/toc-toggle.js

markdown_extensions:
  - tables
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.snippets:
      base_path:
        - docs/
        - .
      url_download: true
  - pymdownx.highlight:
        pygments_lang_class: true
        use_pygments: true
  - pymdownx.tabbed:
        alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
