<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FD619"/>
      <stop offset="100%" stop-color="#5A8F00"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0D0D0D" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Async Engine: Three Layers of Concurrency</text>

  <!-- Layer 1: AsyncTaskScheduler -->
  <rect x="80" y="55" width="640" height="95" rx="8" fill="url(#darkGrad)" stroke="#76B900" stroke-width="2"/>
  <rect x="80" y="55" width="640" height="28" rx="8" fill="#76B900" opacity="0.15"/>
  <text x="400" y="75" text-anchor="middle" fill="#76B900" font-size="13" font-weight="bold">AsyncTaskScheduler</text>
  <text x="100" y="100" fill="#CCC" font-size="11">Dependency-aware task dispatch from ExecutionGraph</text>
  <text x="100" y="118" fill="#999" font-size="10">&#x2022; Topological ordering via Kahn's algorithm</text>
  <text x="100" y="133" fill="#999" font-size="10">&#x2022; Cell-level readiness tracking (CompletionTracker)</text>
  <text x="460" y="118" fill="#999" font-size="10">&#x2022; Multi-column generator deduplication</text>
  <text x="460" y="133" fill="#999" font-size="10">&#x2022; Salvage rounds for retryable failures</text>

  <!-- Arrow -->
  <line x1="400" y1="150" x2="400" y2="170" stroke="#76B900" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <polygon points="395,167 400,177 405,167" fill="#76B900"/>

  <!-- Layer 2: Row-Group Admission -->
  <rect x="80" y="180" width="640" height="95" rx="8" fill="url(#darkGrad)" stroke="#76B900" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="80" y="180" width="640" height="28" rx="8" fill="#76B900" opacity="0.1"/>
  <text x="400" y="200" text-anchor="middle" fill="#8FD619" font-size="13" font-weight="bold">Row-Group Admission &amp; Buffer Management</text>
  <text x="100" y="225" fill="#CCC" font-size="11">Memory-bounded execution with streaming checkpoints</text>
  <text x="100" y="243" fill="#999" font-size="10">&#x2022; Semaphore-gated row-group admission</text>
  <text x="100" y="258" fill="#999" font-size="10">&#x2022; Per-group buffer with cell-level writes</text>
  <text x="460" y="243" fill="#999" font-size="10">&#x2022; Checkpoint-to-parquet on completion</text>
  <text x="460" y="258" fill="#999" font-size="10">&#x2022; Submission semaphore caps in-flight tasks</text>

  <!-- Arrow -->
  <polygon points="395,292 400,302 405,292" fill="#76B900" opacity="0.7"/>

  <!-- Layer 3: ThrottleManager / AIMD -->
  <rect x="80" y="305" width="640" height="95" rx="8" fill="url(#darkGrad)" stroke="#76B900" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="80" y="305" width="640" height="28" rx="8" fill="#76B900" opacity="0.07"/>
  <text x="400" y="325" text-anchor="middle" fill="#5A8F00" font-size="13" font-weight="bold">ThrottleManager (AIMD Adaptive Concurrency)</text>
  <text x="100" y="350" fill="#CCC" font-size="11">Per-model, per-provider rate-limit adaptation</text>
  <text x="100" y="368" fill="#999" font-size="10">&#x2022; Additive increase on success streaks</text>
  <text x="100" y="383" fill="#999" font-size="10">&#x2022; Multiplicative decrease on 429s</text>
  <text x="460" y="368" fill="#999" font-size="10">&#x2022; Independent pools per (provider, model)</text>
  <text x="460" y="383" fill="#999" font-size="10">&#x2022; Global cap across model aliases</text>
</svg>
